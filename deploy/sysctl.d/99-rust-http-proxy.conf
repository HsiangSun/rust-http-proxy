# rust-http-proxy —— Linux 内核调优参数
#
# 目的：把内核默认值从"通用桌面/低并发"调到"高并发正向代理"档位。
# 生效方式：
#   sudo cp deploy/sysctl.d/99-rust-http-proxy.conf /etc/sysctl.d/
#   sudo sysctl --system
#
# 说明：本文件与 rust-http-proxy.service 里的 LimitNOFILE / LimitNPROC 配套使用；
# 二者一个在内核层放开上限，一个在进程层放开上限，缺一不可。

# ── 全局 fd 上限 ──────────────────────────────────────────────────────────
# LimitNOFILE=1048576 需要 fs.nr_open >= 1048576，否则 systemd 会静默降级。
fs.file-max = 2097152
fs.nr_open  = 2097152

# ── 监听队列 / 三次握手 backlog ───────────────────────────────────────────
# somaxconn 是 listen() backlog 的硬上限；tokio 默认 1024，突发流量下会丢 SYN。
net.core.somaxconn           = 65535
net.ipv4.tcp_max_syn_backlog = 65535
net.core.netdev_max_backlog  = 65535

# ── 出向连接端口范围 ─────────────────────────────────────────────────────
# 代理会主动连上游，默认 32768-60999 只有 ~28K，几千并发即 EADDRNOTAVAIL。
net.ipv4.ip_local_port_range = 1024 65535

# ── TIME_WAIT 处理 ───────────────────────────────────────────────────────
# tw_reuse 允许客户端侧安全复用 TIME_WAIT 端口（受 PAWS 保护）。
# tw_recycle 已在 kernel 4.12 移除，不要设置。
net.ipv4.tcp_tw_reuse       = 1
net.ipv4.tcp_fin_timeout    = 15
net.ipv4.tcp_max_tw_buckets = 1000000

# ── TCP 收发缓冲区 ───────────────────────────────────────────────────────
# 代理常穿透大文件/流媒体，放大自动调整上限有利于长肥管道。
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# ── TCP Fast Open ────────────────────────────────────────────────────────
# 3 = 客户端+服务端双向开启，降低握手延迟一个 RTT。
net.ipv4.tcp_fastopen = 3

# ── 拥塞控制：BBR ────────────────────────────────────────────────────────
# 在跨境 / 高丢包 / 长肥管道上比 cubic 显著提升吞吐。
# 需要内核 >= 4.9；AL2023 / Ubuntu 22.04+ 默认已内置。
net.core.default_qdisc          = fq
net.ipv4.tcp_congestion_control = bbr

# ── keepalive ────────────────────────────────────────────────────────────
# 与 proxy_active_connections 指标配合，及时回收僵死连接。
net.ipv4.tcp_keepalive_time   = 300
net.ipv4.tcp_keepalive_intvl  = 30
net.ipv4.tcp_keepalive_probes = 3

# ── conntrack（仅在启用了 nftables/iptables NAT 时相关） ─────────────────
# 无 conntrack 模块时下列 sysctl 不存在，sysctl --system 会跳过并给出警告，无害。
net.netfilter.nf_conntrack_max                   = 1048576
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
