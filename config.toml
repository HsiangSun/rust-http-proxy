# ============================================================================
#  rust-http-proxy 默认配置文件
#  所有字段都可被同名大写环境变量覆盖，例如 PROXY_LISTEN=0.0.0.0:9090
# ============================================================================

#  ┌────────────────────┬─────────────────────────────────┬────────┬──────────────────────────────────────────────────────────────────────┬───────────────────────────────────────────┐
#  │        超时         │             配置项               │ 默认值  │                               作用范围                                 │                  触发后                   │
#  ├────────────────────┼─────────────────────────────────┼────────┼──────────────────────────────────────────────────────────────────────┼───────────────────────────────────────────┤
#  │ 建连超时             │ upstream.connect_timeout_secs   │ 10s    │ 仅 TCP 三次握手                                                        │ HTTP 路径转 Timeout，CONNECT 路径返回 504    │
#  ├────────────────────┼─────────────────────────────────┼────────┼──────────────────────────────────────────────────────────────────────┼───────────────────────────────────────────┤
#  │ 整体 IO 超时         │ server.io_timeout_secs          │ 60s    │ HTTP：等上游返回响应头+读完响应体；CONNECT：隧道单次 read 的最大空闲          │ HTTP 返回 504；CONNECT 隧道中断              │
#  ├────────────────────┼─────────────────────────────────┼────────┼──────────────────────────────────────────────────────────────────────┼───────────────────────────────────────────┤
#  │ 上游连接池空闲超时     │ upstream.pool_idle_timeout_secs │ 90s    │ keep-alive 闲置多久后关闭复用连接                                        │ 连接被池回收，下次请求要新建                   │
#  └────────────────────┴─────────────────────────────────┴────────┴──────────────────────────────────────────────────────────────────────┴───────────────────────────────────────────┘

[server]
# 代理对外监听地址。多个 worker 会通过 SO_REUSEPORT 绑定到同一地址。
listen = "0.0.0.0:8080"
# 启用 SO_REUSEPORT 的 worker 数；0 表示使用当前 CPU 核心数。
workers = 0
# 单条连接的整体读写超时（秒）。
io_timeout_secs = 60

[metrics]
# Prometheus 指标暴露地址 (GET /metrics)。
listen = "0.0.0.0:9090"

[dns]
# 缓存 TTL（秒）。题目要求 1 分钟。
ttl_secs = 60
# 缓存最大条目数，超过后按 LRU-like 方式淘汰最旧条目。
max_entries = 10_000

[upstream]
# 上游 keep-alive 连接池每个 host 的最大空闲连接数。
pool_max_idle_per_host = 64
# 空闲连接最长保持时长（秒）。
pool_idle_timeout_secs = 90
# 建连超时（秒）。
connect_timeout_secs = 10

[openobserve]
# 是否启用日志上报。
enabled = false
# OpenObserve 入口，例如 https://api.openobserve.ai
endpoint = "http://127.0.0.1:5080"
organization = "default"
stream = "proxy_logs"
# Basic Auth 凭证（建议通过环境变量 OO_USERNAME / OO_PASSWORD 注入）。
username = ""
password = ""
# 批量上报参数。
batch_size = 200
flush_interval_ms = 1000
# 通道缓冲，超出后将丢弃最旧日志以保护代理主路径。
channel_capacity = 10_000
