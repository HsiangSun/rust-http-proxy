name: Build & Release (aarch64-linux-gnu)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build aarch64-unknown-linux-gnu
    runs-on: ubuntu-22.04-arm
    env:
      CARGO_TERM_COLOR: always
      BIN_NAME: rust-http-proxy
      TARGET: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ env.TARGET }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.TARGET }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Verify glibc compatibility
        run: |
          file target/${{ env.TARGET }}/release/${{ env.BIN_NAME }}
          echo "--- Required GLIBC versions ---"
          objdump -T target/${{ env.TARGET }}/release/${{ env.BIN_NAME }} \
            | grep -oE 'GLIBC_[0-9.]+' | sort -u || true

      - name: Package artifact
        id: pkg
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PKG_NAME="${{ env.BIN_NAME }}-${VERSION}-${{ env.TARGET }}.tar.gz"
          # 解压后用户会得到一个清晰的子目录，避免污染当前路径。
          STAGE="${{ env.BIN_NAME }}-${VERSION}"

          mkdir -p "dist/${STAGE}/deploy"

          # 必备：二进制 + 默认配置 + 部署脚本/unit
          cp "target/${{ env.TARGET }}/release/${{ env.BIN_NAME }}" "dist/${STAGE}/"
          cp config.toml                                            "dist/${STAGE}/"
          cp deploy/rust-http-proxy.service                         "dist/${STAGE}/deploy/"
          cp deploy/install.sh                                      "dist/${STAGE}/deploy/"
          chmod +x "dist/${STAGE}/deploy/install.sh"

          # 文档：有就带，没有也不致命
          [ -f README.md ] && cp README.md "dist/${STAGE}/" || true
          [ -d docs ]      && cp -r docs   "dist/${STAGE}/" || true

          tar -czf "${PKG_NAME}" -C dist "${STAGE}"
          sha256sum "${PKG_NAME}" > "${PKG_NAME}.sha256"
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT

          echo "--- tarball contents ---"
          tar -tzf "${PKG_NAME}" | head -50

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.pkg_name }}
          path: |
            ${{ steps.pkg.outputs.pkg_name }}
            ${{ steps.pkg.outputs.pkg_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.pkg_name }}
            ${{ steps.pkg.outputs.pkg_name }}.sha256
          generate_release_notes: true
